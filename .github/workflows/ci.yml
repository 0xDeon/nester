name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  # Detect which areas of the monorepo changed so downstream jobs can skip
  # work they don't need to run. Each filter is an OR of globs; if ANY match,
  # that area's job will execute its steps. Workflow/shared changes force
  # everything to run.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      website: ${{ steps.filter.outputs.website }}
      intelligence: ${{ steps.filter.outputs.intelligence }}
      dapp: ${{ steps.filter.outputs.dapp }}
      api: ${{ steps.filter.outputs.api }}
      internal: ${{ steps.filter.outputs.internal }}
      contracts: ${{ steps.filter.outputs.contracts }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # On push events, compare against the previous commit so the first
          # push to a branch doesn't mark every filter as "changed". On PRs
          # this defaults to the merge base.
          base: ${{ github.event_name == 'push' && github.event.before || '' }}
          filters: |
            shared:
              - '.github/workflows/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'pnpm-workspace.yaml'
            website:
              - 'apps/website/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            intelligence:
              - 'apps/intelligence/**'
            dapp:
              - 'apps/dapp/**'
            api:
              - 'apps/api/**'
            internal:
              - 'internal/**'
              - 'go.mod'
              - 'go.sum'
            contracts:
              - 'packages/contracts/**'

  website:
    name: Website (Next.js)
    needs: changes
    if: needs.changes.outputs.website == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build website
        run: pnpm --filter @nester/website build

      - name: Lint website
        run: pnpm --filter @nester/website lint

      - name: Audit JS dependencies (website)
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

  intelligence:
    name: Intelligence (Python)
    needs: changes
    if: needs.changes.outputs.intelligence == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/intelligence
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff mypy pytest

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy app

      - name: Test
        run: pytest

      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --desc
        continue-on-error: true

  dapp-frontend:
    name: Dapp Frontend (Next.js)
    needs: changes
    if: needs.changes.outputs.dapp == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dapp/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Audit JS dependencies (dapp)
        run: npm audit --audit-level=moderate
        continue-on-error: true

  security:
    name: Security Scanning
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
        if: needs.changes.outputs.contracts == 'true' || needs.changes.outputs.shared == 'true'

      - name: Install cargo-audit
        if: needs.changes.outputs.contracts == 'true' || needs.changes.outputs.shared == 'true'
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        if: needs.changes.outputs.contracts == 'true' || needs.changes.outputs.shared == 'true'
        run: cargo audit
        working-directory: packages/contracts

      - uses: actions/setup-go@v5
        if: needs.changes.outputs.api == 'true' || needs.changes.outputs.internal == 'true' || needs.changes.outputs.shared == 'true'
        with:
          go-version-file: apps/api/go.mod
          cache: true

      - name: Install govulncheck
        if: needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true'
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Audit Go dependencies
        if: needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true'
        run: govulncheck ./...
        working-directory: apps/api

      - name: Install gosec
        if: needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true'
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        if: needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true'
        run: gosec -severity medium ./...
        working-directory: apps/api

      - uses: actions/setup-node@v4
        if: needs.changes.outputs.dapp == 'true' || needs.changes.outputs.shared == 'true'
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        if: needs.changes.outputs.dapp == 'true' || needs.changes.outputs.shared == 'true'

      - name: Audit JavaScript dependencies
        if: needs.changes.outputs.dapp == 'true' || needs.changes.outputs.shared == 'true'
        run: pnpm audit --audit-level=high
        working-directory: apps/dapp/frontend

      - uses: actions/setup-python@v5
        if: needs.changes.outputs.intelligence == 'true' || needs.changes.outputs.shared == 'true'
        with:
          python-version: "3.12"

      - name: Install Python audit tools
        if: needs.changes.outputs.intelligence == 'true' || needs.changes.outputs.shared == 'true'
        run: pip install pip-audit bandit

      - name: Audit Python dependencies
        if: needs.changes.outputs.intelligence == 'true' || needs.changes.outputs.shared == 'true'
        run: pip-audit -r requirements.txt
        working-directory: apps/intelligence

      - name: Run bandit
        if: needs.changes.outputs.intelligence == 'true' || needs.changes.outputs.shared == 'true'
        run: bandit -r app -ll
        working-directory: apps/intelligence

  api:
    name: API (Go)
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -timeout 120s -count=1 ./...

      - name: Check Go vulnerabilities
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        continue-on-error: true

  internal-stellar:
    name: Internal (Go)
    needs: changes
    if: needs.changes.outputs.internal == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Go module
        id: check
        run: |
          if [ -f "go.mod" ] && [ -d "internal" ]; then
            echo "has_module=true" >> $GITHUB_OUTPUT
          else
            echo "has_module=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-go@v5
        if: steps.check.outputs.has_module == 'true'
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        if: steps.check.outputs.has_module == 'true'
        run: go test -v -race ./internal/...

      - name: Check formatting
        if: steps.check.outputs.has_module == 'true'
        run: |
          if [ "$(gofmt -s -l ./internal | wc -l)" -gt 0 ]; then
            echo "Code formatting issues found"
            gofmt -s -d ./internal
            exit 1
          fi

      - name: Run vet
        if: steps.check.outputs.has_module == 'true'
        run: go vet ./internal/...

  contracts:
    name: Contracts (Rust)
    needs: changes
    if: needs.changes.outputs.contracts == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Add wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown


      - name: Build yield_registry WASM
        run: cargo build --release --target wasm32-unknown-unknown -p yield-registry-contract

      - name: Ensure yield_registry.wasm is available for allocation_strategy
        run: |
          mkdir -p contracts/allocation_strategy/../../../target/wasm32-unknown-unknown/release
          cp target/wasm32-unknown-unknown/release/yield_registry.wasm contracts/allocation_strategy/../../../target/wasm32-unknown-unknown/release/yield_registry.wasm

      - name: Build allocation_strategy WASM
        run: cargo build --release --target wasm32-unknown-unknown -p allocation-strategy-contract

      - name: Build vault_token WASM
        run: cargo build --release --target wasm32-unknown-unknown -p vault-token-contract

      - name: Test contracts
        run: cargo test --lib

      - name: Audit Rust dependencies
        run: |
          cargo install cargo-audit
          cargo audit --deny warnings
        continue-on-error: true
